<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scam Call Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
        }
        .logo { font-size: 60px; margin-bottom: 10px; }
        h1 { font-size: 24px; margin-bottom: 5px; color: #a78bfa; }
        p { color: #888; margin-bottom: 30px; font-size: 14px; }
        .btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-stop {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            display: none;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 16px;
            display: none;
        }
        .status.recording {
            background: #1e3a2f;
            border: 1px solid #22c55e;
            color: #22c55e;
            display: block;
        }
        .status.analyzing {
            background: #1e2a3a;
            border: 1px solid #3b82f6;
            color: #3b82f6;
            display: block;
        }
        .status.real {
            background: #1e3a2f;
            border: 1px solid #22c55e;
            color: #22c55e;
            display: block;
        }
        .status.fake {
            background: #3a1e1e;
            border: 1px solid #ef4444;
            color: #ef4444;
            display: block;
        }
        .confidence {
            font-size: 13px;
            margin-top: 8px;
            color: #888;
        }
        .wave {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin: 20px 0;
        }
        .wave.active { display: flex; }
        .wave span {
            width: 6px;
            height: 30px;
            background: #6366f1;
            border-radius: 3px;
            animation: wave 0.8s infinite ease-in-out;
        }
        .wave span:nth-child(2) { animation-delay: 0.1s; }
        .wave span:nth-child(3) { animation-delay: 0.2s; }
        .wave span:nth-child(4) { animation-delay: 0.3s; }
        .wave span:nth-child(5) { animation-delay: 0.4s; }
        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1.5); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛡️</div>
        <h1>AI Scam Detector</h1>
        <p>Record a voice to detect if it's AI generated</p>

        <button class="btn" id="startBtn" onclick="startRecording()">
            🎤 Start Recording
        </button>
        <button class="btn btn-stop" id="stopBtn" onclick="stopRecording()">
            ⏹️ Stop & Analyze
        </button>

        <div class="wave" id="wave">
            <span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="status" id="status"></div>
        <div class="confidence" id="confidence"></div>
    </div>

    <script>
        const API_URL = 'https://ai-scam-detector-zn0m.onrender.com';
        let mediaRecorder;
        let audioChunks = [];

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = analyzeAudio;
                mediaRecorder.start();

                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                document.getElementById('wave').classList.add('active');
                showStatus('recording', '🎤 Recording... Speak now!');

            } catch(e) {
                showStatus('fake', '❌ Microphone access denied!');
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('wave').classList.remove('active');
            showStatus('analyzing', '🔍 Analyzing voice...');
        }

        async function analyzeAudio() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            const formData = new FormData();
            formData.append('audio', audioBlob, 'recording.wav');

            try {
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.is_scam) {
                    showStatus('fake', '⚠️ AI VOICE DETECTED! Possible SCAM!');
                } else {
                    showStatus('real', '✅ Real Human Voice! Genuine Call!');
                }
                document.getElementById('confidence').textContent =
                    `Confidence: ${result.confidence}%`;

            } catch(e) {
                showStatus('fake', '❌ Error connecting to server');
            }

            document.getElementById('startBtn').style.display = 'block';
        }

        function showStatus(type, message) {
            const el = document.getElementById('status');
            el.className = `status ${type}`;
            el.textContent = message;
        }
    </script>
</body>
</html>
